<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Asistente Facultad</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}" />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link href="{{ url_for('static', filename='css/panel.css') }}" rel="stylesheet" />
</head>
<body class="bg-body-tertiary">
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-7 col-lg-5">
        <section class="card border-0 shadow-sm">
          <div class="login-hero-wrap">
            <img
              src="{{ url_for('static', filename='img/login-hero.png', v='20260424-1') }}"
              alt="Seguridad, calendario, sincronización y bot"
              class="login-hero-img"
              onerror="this.onerror=null;this.src='{{ url_for('static', filename='img/login-hero.svg', v='20260424-1') }}';"
            />
          </div>
          <div class="card-body p-4">
            <h1 class="h4 mb-3">Ingresar al panel</h1>
            <p class="text-secondary small mb-4">Acceso administrativo de entregas y configuración.</p>
            {% if error %}
              <div class="alert alert-danger py-2">{{ error }}</div>
            {% endif %}
            <form method="post" autocomplete="off">
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input id="email" name="email" type="email" class="form-control" required />
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input id="password" name="password" type="password" class="form-control" required />
              </div>
              <button type="submit" class="btn btn-success w-100">Iniciar sesión</button>
            </form>
            <p class="small text-secondary mt-3 mb-0">
              ¿No tenés cuenta?
              <a href="{{ url_for('web.registro') }}">Registrate</a>.
            </p>
          </div>
        </section>
      </div>
    </div>
  </main>
</body>
</html>
